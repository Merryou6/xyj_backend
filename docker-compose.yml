version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: django_db
    environment:
      MYSQL_DATABASE: xyj_test
      MYSQL_USER: admin
      MYSQL_PASSWORD: 123456
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - django_network

  web:
    build: .
    container_name: django_web
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=xyj_test
      - DB_USER=admin
      - DB_PASSWORD=123456
    networks:
      - django_network

volumes:
  mysql_data:

networks:
  django_network:
    driver: bridge